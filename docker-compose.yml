services:
  jekyll:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "bundle install && bundle exec jekyll serve --watch --host 0.0.0.0 --port 4000"
    ports:
      - "4000:4000"
    volumes:
      - .:/srv/jekyll
      - bundle_cache:/usr/local/bundle
    working_dir: /srv/jekyll
    environment:
      JEKYLL_ENV: development
      BUNDLE_PATH: /usr/local/bundle
      BUNDLE_APP_CONFIG: /usr/local/bundle
      BUNDLE_JOBS: 4
      BUNDLE_RETRY: 3

volumes:
  bundle_cache:
