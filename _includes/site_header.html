<header>
{% if site.theme_config.show_navbar == true %}
  {% include horizontal_list.html collection=site.data.home.navbar_entries %}
  <div class="dashed"></div>
{% endif %}

  <div class="site-identity">
    <a class="site-logo-link" href="{{ '/' | relative_url }}" aria-label="Go to {{ site.title }} homepage">
      <img
        class="site-logo"
        src="{{ site.logo | relative_url }}"
        alt="{{ site.title }} logo"
        width="96"
        height="96"
      >
    </a>

    <div class="site-identity-copy">
      <h1>{{ site.title }}</h1>
      {% if site.theme_config.show_description == true %}
        <p>{{ site.description }}</p>
      {% endif %}
    </div>
  </div>
</header>
